name: Security Scan

on:
  schedule:
    # Run at 2 AM UTC every Monday
    - cron: '0 2 * * 1'
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  dependency-scan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js 20.x
        uses: actions/setup-node@v6
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --production
        continue-on-error: true

      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  secret-scan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Prepare TruffleHog scan refs
        id: trufflehog-refs
        if: github.event_name != 'schedule'
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          PUSH_BASE: ${{ github.event.before }}
          PUSH_HEAD: ${{ github.sha }}
          PR_BASE: ${{ github.event.pull_request.base.sha }}
          PR_HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          null_sha='0000000000000000000000000000000000000000'
          scan_mode='diff'
          base=''
          head=''

          case "$EVENT_NAME" in
            push)
              base="$PUSH_BASE"
              head="$PUSH_HEAD"
              ;;
            pull_request)
              base="$PR_BASE"
              head="$PR_HEAD"
              ;;
            *)
              scan_mode='full'
              ;;
          esac

          if [[ "$scan_mode" == 'diff' ]]; then
            if [[ -z "$base" || -z "$head" || "$base" == "$head" || "$base" == "$null_sha" || "$head" == "$null_sha" ]]; then
              echo "Falling back to full TruffleHog scan because diff refs are not comparable for $EVENT_NAME."
              scan_mode='full'
              base=''
              head=''
            fi
          fi

          {
            echo "scan_mode=$scan_mode"
            echo "base=$base"
            echo "head=$head"
          } >> "$GITHUB_OUTPUT"

      - name: Detect secrets with Trufflehog (diff scan)
        if: github.event_name != 'schedule' && steps.trufflehog-refs.outputs.scan_mode == 'diff'
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ steps.trufflehog-refs.outputs.base }}
          head: ${{ steps.trufflehog-refs.outputs.head }}
          extra_args: --only-verified

      - name: Detect secrets with Trufflehog (full scan)
        if: github.event_name == 'schedule'
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ''
          head: HEAD
          extra_args: --only-verified

      - name: Detect secrets with Trufflehog (fallback full scan)
        if: github.event_name != 'schedule' && steps.trufflehog-refs.outputs.scan_mode == 'full'
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ''
          head: HEAD
          extra_args: --only-verified

      - name: Check for hardcoded secrets
        run: |
          # Check for common patterns
          patterns=(
            "sk-[a-zA-Z0-9]{48}"  # OpenAI
            "AKIA[0-9A-Z]{16}"     # AWS Access Key
            "-----BEGIN.*KEY-----" # Private keys
            "token.*[:=].*['\"][a-zA-Z0-9]{20,}" # Generic tokens
          )

          for pattern in "${patterns[@]}"; do
            if git grep -E "$pattern" -- ':(exclude).env*' ':(exclude)*.example' ':(exclude)test*' ':(exclude)*.test.*' ':(exclude)test-*' ':(exclude)*.md'; then
              echo "WARNING: Potential secret found matching pattern: $pattern"
              exit 1
            fi
          done

  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
